name: citibike-lakehouse

services:
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: citibike-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-client:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: citibike-minio-client
    profiles: ["tools"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/opt/project/scripts/init_minio.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-lakehouse}
    volumes:
      - ./:/opt/project

  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: citibike-lakehouse-spark:latest
    container_name: citibike-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
    ports:
      - "${SPARK_MASTER_WEB_PORT:-8080}:8080"
      - "7077:7077"
    volumes:
      - ./:/opt/project
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: citibike-lakehouse-spark:latest
    container_name: citibike-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_MEMORY: ${SPARK_EXECUTOR_MEMORY:-2g}
      SPARK_WORKER_CORES: "2"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "${SPARK_WORKER_WEB_PORT:-8081}:8081"
    volumes:
      - ./:/opt/project
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro

  spark-driver:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: citibike-lakehouse-spark:latest
    container_name: citibike-spark-driver
    depends_on:
      - spark-master
      - spark-worker
      - minio
    env_file:
      - .env
    environment:
      PYTHONPATH: /opt/project
    volumes:
      - ./:/opt/project
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    command: sleep infinity

  jupyter:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: citibike-lakehouse-spark:latest
    container_name: citibike-jupyter
    depends_on:
      - spark-master
      - minio
    env_file:
      - .env
    environment:
      PYTHONPATH: /opt/project
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    volumes:
      - ./:/opt/project
      - ./config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    command: >
      bash -lc "jupyter lab --ip=0.0.0.0 --port=8888 --no-browser
      --allow-root --ServerApp.token=${JUPYTER_TOKEN:-lakehouse}
      --notebook-dir=/opt/project"

  trino:
    image: trinodb/trino:449
    container_name: citibike-trino
    profiles: ["analytics"]
    depends_on:
      - minio
    ports:
      - "${TRINO_PORT:-8085}:8080"
    volumes:
      - ./config/trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./config/trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./config/trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./config/trino/etc/log.properties:/etc/trino/log.properties:ro
      - ./config/trino/catalog:/etc/trino/catalog:ro

  superset-db:
    image: postgres:15-alpine
    container_name: citibike-superset-db
    profiles: ["analytics"]
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 10

  superset:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    image: citibike-lakehouse-superset:latest
    container_name: citibike-superset
    profiles: ["analytics"]
    depends_on:
      superset-db:
        condition: service_healthy
      trino:
        condition: service_started
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-this-local-secret}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - ./config/superset:/app/pythonpath:ro
      - superset-home:/app/superset_home
    command: >
      /bin/bash -c "superset db upgrade &&
      superset fab create-admin --username ${SUPERSET_ADMIN_USER:-admin}
      --firstname Lake --lastname House --email ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
      --password ${SUPERSET_ADMIN_PASSWORD:-admin} || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088"

volumes:
  minio-data:
  superset-db-data:
  superset-home:
